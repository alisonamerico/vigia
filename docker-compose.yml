services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: vigia
      POSTGRES_USER: vigia
      POSTGRES_PASSWORD: vigia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vigia"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.18
    command:
      - redpanda
      - start
      - --kafka-addr=internal://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://localhost:9092
      - --pandaproxy-addr=internal://0.0.0.0:8082
      - --advertise-pandaproxy-addr=http://localhost:8082
      - --schema-registry-addr=internal://0.0.0.0:8081
      - --rpc-addr=internal://0.0.0.0:33145
      - --advertise-rpc-addr=localhost:33145
      - --mode=dev-container
    ports:
      - "9092:9092"
      - "8081:8081"
      - "8082:8082"
    volumes:
      - redpanda_data:/var/lib/redpanda/data

volumes:
  postgres_data:
  redis_data:
  redpanda_data:
